name: Build Agent

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "eSatici_eKassa" \
          --collect-data customtkinter \
          --collect-data certifi \
          --hidden-import certifi \
          "eSatici_eKassa.py"

    - name: Zip Windows Artifact
      if: runner.os == 'Windows'
      run: 7z a -pesatici2026 eSatici_eKassa_Windows.zip ./dist/eSatici_eKassa/*

    - name: Zip macOS Artifact
      if: runner.os == 'macOS'
      run: cd dist && zip -P esatici2026 -r ../eSatici_eKassa_macOS.zip eSatici_eKassa.app

    - name: Publish Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "eSatici eKassa Agent v1.0.${{ github.run_number }}"
        files: |
          eSatici_eKassa_Windows.zip
          eSatici_eKassa_macOS.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
